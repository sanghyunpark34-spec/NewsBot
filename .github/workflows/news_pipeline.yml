name: News Automation Pipeline

on:
  schedule:
    # 한국 시간(KST) 매주 월~금 오전 7시 48분에 구동
    # UTC 기준으로는 전날(일~목) 오후 10시 48분입니다.
    - cron: '48 22 * * 0-4'
  workflow_dispatch:

jobs:
  automation-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client requests google-genai pytz holidays groq pandas

      - name: Run Orchestrator Pipeline
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          
          # 👇 수동/자동 실행 여부를 구분하여 주말 락(Lock)을 해제하는 핵심 변수입니다.
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          
          # 👇 파이썬 코드가 정상적으로 읽을 수 있도록 텔레그램 환경 변수명을 동기화합니다.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python orchestrator.py
