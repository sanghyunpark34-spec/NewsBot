name: News Automation Pipeline

on:
  schedule:
    # 한국 시간(KST) 매일 오후 15시 정각에 최초 구동 (UTC 기준 06:00 AM)
    - cron: '0 6 * * *'
  workflow_dispatch: # 필요할 때 언제든 수동으로 실행 가능한 버튼 유지

jobs:
  automation-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client requests google-generativeai pytz holidays

      # 총괄 제어 프로그램을 실행하여 공휴일 판단, 7분 주기 재시도, 16시 제한을 일괄 처리합니다.
      - name: Run Orchestrator Pipeline
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
        run: python orchestrator.py
