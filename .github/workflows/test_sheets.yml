name: Test Google Sheets Connection

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install gspread
      run: pip install gspread oauth2client
    - name: Run Test
      env:
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      run: |
        # 시크릿을 임시 파일로 저장
        echo "$GOOGLE_SHEETS_CREDENTIALS" > credentials.json
        # 간단한 테스트 코드 실행
        python -c "
        import gspread
        from oauth2client.service_account import ServiceAccountCredentials
        scope = ['https://spreadsheets.google.com/feeds', 'https://www.googleapis.com/auth/drive']
        creds = ServiceAccountCredentials.from_json_keyfile_name('credentials.json', scope)
        client = gspread.authorize(creds)
        sheet = client.open('News_Management_DB').sheet1
        sheet.insert_row(['Test', 'Date', 'Success'], 1)
        print('연결 성공!')
        "
